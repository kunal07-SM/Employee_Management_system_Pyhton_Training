{% if messages %}

<div class="mt-3">

{% for message in messages %}

<div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm rounded-3">

<i class="bi bi-info-circle-fill me-2"></i>

{{ message }}

<button
type="button"
class="btn-close"
data-bs-dismiss="alert">
</button>

</div>

{% endfor %}

</div>

{% endif %}
